<html dir="ltr" mozdisallowselectionprint>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<!--#if GENERIC || CHROME-->
    <meta name="google" content="notranslate">
<!--#endif-->
    <title>PDF.js viewer</title>

<!--#if MOZCENTRAL-->
<!--#include viewer-snippet-firefox-extension.html-->
<!--#elif CHROME-->
<!--#include viewer-snippet-chrome-extension.html-->
<!--#else-->
<!--#include viewer-snippet.html-->
<!--#endif-->

<!--#if MOZCENTRAL-->
<!--<link rel="stylesheet" href="resource://pdf.js/web/viewer.css">-->
<!--<link rel="localization" href="toolkit/pdfviewer/viewer.ftl"/>-->
<!--#else-->
    <link rel="stylesheet" href="viewer.css">
<!--#endif-->

<!--#if MOZCENTRAL-->
<!--<script src="resource://pdf.js/web/viewer.mjs" type="module"></script>-->
<!--#elif !MOZCENTRAL-->
<!--<script src="viewer.mjs" type="module"></script>-->
<!--#elif /* Development mode. */-->

    <script type="importmap">
      {
        "imports": {
          "pdfjs/": "../src/",
          "pdfjs-lib": "../src/pdf.js",
          "pdfjs-web/": "./",

          "fluent-bundle": "../node_modules/@fluent/bundle/esm/index.js",
          "fluent-dom": "../node_modules/@fluent/dom/esm/index.js",
          "cached-iterable": "../node_modules/cached-iterable/src/index.mjs",

          "display-fetch_stream": "../src/display/fetch_stream.js",
          "display-network": "../src/display/network.js",
          "display-node_stream": "../src/display/stubs.js",
          "display-node_utils": "../src/display/stubs.js",

          "web-alt_text_manager": "./alt_text_manager.js",
          "web-annotation_editor_params": "./annotation_editor_params.js",
          "web-download_manager": "./download_manager.js",
          "web-external_services": "./genericcom.js",
          "web-null_l10n": "./genericl10n.js",
          "web-pdf_attachment_viewer": "./pdf_attachment_viewer.js",
          "web-pdf_cursor_tools": "./pdf_cursor_tools.js",
          "web-pdf_document_properties": "./pdf_document_properties.js",
          "web-pdf_find_bar": "./pdf_find_bar.js",
          "web-pdf_layer_viewer": "./pdf_layer_viewer.js",
          "web-pdf_outline_viewer": "./pdf_outline_viewer.js",
          "web-pdf_presentation_mode": "./pdf_presentation_mode.js",
          "web-pdf_sidebar": "./pdf_sidebar.js",
          "web-pdf_thumbnail_viewer": "./pdf_thumbnail_viewer.js",
          "web-preferences": "./genericcom.js",
          "web-print_service": "./pdf_print_service.js",
          "web-secondary_toolbar": "./secondary_toolbar.js",
          "web-toolbar": "./toolbar.js"
        }
      }
    </script>
    <script src="viewer.js" type="module"></script>
<!--#endif-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.slim.min.js"></script>
    <script src="latex_replay.js"></script>
    <link rel="stylesheet" href="latex_replay.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  </head>

  <body tabindex="1">
    <div id="outerContainer">

      <div id="latexContaianer" style="width: 48%;height: 100%;margin-left: 0.5%;margin-right: 0.5%;display: flex;flex-direction: column;">
        <div style="height: 6rem;">
        <select style="width: 100%; height: 1.5rem; margin: 0.3rem 0 0.3rem 0">
          <option value="test">test</option>
        </select>
        <div id="latexDataDisplay" style="display: flex;justify-content: space-between;height: 1.8rem;overflow: hidden;">
          <div id="latexFrameControl" style="display: flex;gap: 1vw;">
            <div id="latexFrameNumber" style="display: flex; align-items: center;">
              <input id="latexFrameNumberInput" value="0" type="number" min="0" max="2890" style="width: 40px;padding: 4px 7px;text-align: end;">
              <span style="text-wrap: nowrap;">/ 2890</span>
            </div>
            <div id="latexFramePlaySpeed" style="align-items: center;display: flex;gap: 0.5vw;">
              <label class="latexDataLabel">Speed:</label>
              <select id="replaySpeed" style="width: fit-content; height: fit-content; padding: 0.5vh 0.5vw 0.5vh 0.5vw;">
                  <option value="1">x 1</option>
                  <option value="2">x 2</option>
                  <option value="3">x 3</option>
                  <option value="4">x 4</option>
                  <option value="5">x 5</option>
              </select>
            </div>
          </div>
          <div id="latexInfo" style="display: flex;gap: 1vw;align-items: center;">
             <div id="latexFilename" style="display: flex; gap: 0.5vw;">
                <label class="latexDataLabel">File:</label>
                <span>1_introduction.tex</span>
             </div>
             <div id="latexFrameLabel" style="display: flex; gap: 0.5vw;">
                <label class="latexDataLabel">Label: </label>
                <span style="Color:Green">Section Planning</span>
             </div>
          </div>
        </div>
        <div id="latexPlayPanel" style="display: flex">
          <input id="latexFrameSlider" ,="" type="range" min="0" max="100" value="0" style="width: 95%;">
          <i id="previousFrame" class="fa-solid fa-backward latexPlayButton"></i>
          <i id="pauseOrPlay" class="fa-solid fa-play latexPlayButton" data-state="pause"></i>
          <i id="nextFrame" class="fa-solid fa-forward latexPlayButton"></i>
        </div>
      </div>
        <div id="latexTextArea" style="height: 90%; background: white; flex-shrink: 1;"></div>
      </div>

      <div id="mainContainer">

        <div class="toolbar">
          <div id="toolbarContainer">
            <div id="toolbarViewer">
              <div id="toolbarViewerLeft">
                <div class="splitToolbarButton hiddenSmallView">
                  <button class="toolbarButton" title="Previous Page" id="previous" tabindex="13" data-l10n-id="pdfjs-previous-button">
                    <span data-l10n-id="pdfjs-previous-button-label">Previous</span>
                  </button>
                  <div class="splitToolbarButtonSeparator"></div>
                  <button class="toolbarButton" title="Next Page" id="next" tabindex="14" data-l10n-id="pdfjs-next-button">
                    <span data-l10n-id="pdfjs-next-button-label">Next</span>
                  </button>
                </div>
                <span class="loadingInput start">
                  <input type="number" id="pageNumber" class="toolbarField" title="Page" value="1" min="1" tabindex="15" data-l10n-id="pdfjs-page-input" autocomplete="off">
                </span>
                <span id="numPages" class="toolbarLabel"></span>
              </div>

              <div id="toolbarViewerMiddle">
                <div class="splitToolbarButton">
                  <button id="zoomOut" class="toolbarButton" title="Zoom Out" tabindex="21" data-l10n-id="pdfjs-zoom-out-button">
                    <span data-l10n-id="pdfjs-zoom-out-button-label">Zoom Out</span>
                  </button>
                  <div class="splitToolbarButtonSeparator"></div>
                  <button id="zoomIn" class="toolbarButton" title="Zoom In" tabindex="22" data-l10n-id="pdfjs-zoom-in-button">
                    <span data-l10n-id="pdfjs-zoom-in-button-label">Zoom In</span>
                   </button>
                </div>
                <span id="scaleSelectContainer" class="dropdownToolbarButton">
                  <select id="scaleSelect" title="Zoom" tabindex="23" data-l10n-id="pdfjs-zoom-select">
                    <option id="pageAutoOption" title="" value="auto" selected="selected" data-l10n-id="pdfjs-page-scale-auto">Automatic Zoom</option>
                    <option id="pageActualOption" title="" value="page-actual" data-l10n-id="pdfjs-page-scale-actual">Actual Size</option>
                    <option id="pageFitOption" title="" value="page-fit" data-l10n-id="pdfjs-page-scale-fit">Page Fit</option>
                    <option id="pageWidthOption" title="" value="page-width" data-l10n-id="pdfjs-page-scale-width">Page Width</option>
                    <option id="customScaleOption" title="" value="custom" disabled="disabled" hidden="true" data-l10n-id="pdfjs-page-scale-percent" data-l10n-args='{ "scale": 0 }'>0%</option>
                    <option title="" value="0.5" data-l10n-id="pdfjs-page-scale-percent" data-l10n-args='{ "scale": 50 }'>50%</option>
                    <option title="" value="0.75" data-l10n-id="pdfjs-page-scale-percent" data-l10n-args='{ "scale": 75 }'>75%</option>
                    <option title="" value="1" data-l10n-id="pdfjs-page-scale-percent" data-l10n-args='{ "scale": 100 }'>100%</option>
                    <option title="" value="1.25" data-l10n-id="pdfjs-page-scale-percent" data-l10n-args='{ "scale": 125 }'>125%</option>
                    <option title="" value="1.5" data-l10n-id="pdfjs-page-scale-percent" data-l10n-args='{ "scale": 150 }'>150%</option>
                    <option title="" value="2" data-l10n-id="pdfjs-page-scale-percent" data-l10n-args='{ "scale": 200 }'>200%</option>
                    <option title="" value="3" data-l10n-id="pdfjs-page-scale-percent" data-l10n-args='{ "scale": 300 }'>300%</option>
                    <option title="" value="4" data-l10n-id="pdfjs-page-scale-percent" data-l10n-args='{ "scale": 400 }'>400%</option>
                  </select>
                </span>
              </div>
            </div>
          </div>
        </div>

        <div id="viewerContainer" tabindex="0">
          <div id="viewer" class="pdfViewer"></div>
        </div>

      </div> <!-- mainContainer -->

    </div> <!-- outerContainer -->
  </body>
</html>
